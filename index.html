<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HARPER">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="HARPER — телефонный хоррор-триллер о номере убитой девушки, закрытой компании друзей и правде, которую все пытаются пережить.">
    <title>HARPER</title>
    <link rel="icon" type="image/svg+xml" href="src/assets/icons/lucide/message-circle.svg">
    <link rel="manifest" href="manifest.webmanifest?v=123">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css?v=127">
</head>
<body>
    <div id="app">
        <!-- Phone frame -->
        <div id="phone-frame">
            <!-- Status bar -->
            <div id="status-bar">
                <span id="status-time">21:37</span>
                <div id="status-icons">
                    <img class="status-icon" src="src/assets/icons/lucide/wifi.svg" alt="" aria-hidden="true" />
                    <img class="status-icon" src="src/assets/icons/lucide/battery-medium.svg" alt="" aria-hidden="true" />
                    <span id="status-battery">87%</span>
                </div>
            </div>

            <!-- Screen container -->
            <div id="screen-container">
                <!-- Screens will be dynamically injected here -->
            </div>

            <!-- Notification toast -->
            <div id="notification-toast" class="hidden">
                <div class="notif-icon" aria-hidden="true"><img src="src/assets/icons/lucide/message-circle.svg" alt="" /></div>
                <div class="notif-content">
                    <div class="notif-title"></div>
                    <div class="notif-text"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Glitch overlay -->
    <div id="glitch-overlay" class="hidden"></div>

    <script>
        window.setTimeout(function () {
            var container = document.getElementById('screen-container');
            if (!container || document.documentElement.dataset.harperReady === 'true' || container.children.length > 0) return;

            container.innerHTML = '<div class="boot-error"><div class="boot-error-card"><div class="boot-error-mark">!</div><strong>Игра не запустилась</strong><p>Не открывай index.html двойным кликом. Запусти файл START_GAME.cmd — он откроет игру правильно.</p></div></div>';
        }, 3500);
    </script>
    <script type="module" src="main.js?v=130"></script>
</body>
</html>
